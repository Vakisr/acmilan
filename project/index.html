<script>
/* dedupe the world pool by name — curated (earlier) entries win over generated */
(function(){
  var M=window.MILAN, seen=Object.create(null), out=[];
  for (var i=0;i<M.WORLD.length;i++){
    var p=M.WORLD[i], key=p.name.toLowerCase();
    if (seen[key]) continue;
    seen[key]=1; out.push(p);
  }
  M.WORLD=out;
})();
</script>
