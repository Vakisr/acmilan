name: Refresh player data

on:
  schedule:
    - cron: "0 4 * * 1"   # every Monday at 04:00 UTC
  workflow_dispatch:        # run manually from the Actions tab any time

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fetch live player data from Transfermarkt
        run: node scripts/fetch-players.js

      - name: Commit updated players.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add project/players.json
          if git diff --cached --quiet; then
            echo "No changes to player data."
          else
            git commit -m "Refresh player data $(date -u +%Y-%m-%d)"
            git push
          fi
